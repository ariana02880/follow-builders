name: Daily AI Builders Digest

on:
  # Runs 45 minutes after generate-feed.yml (which runs at 06:17 UTC)
  # 07:00 UTC = 15:00 Beijing (CST)
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout (reads feed files already committed by generate-feed.yml) ─
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node setup ───────────────────────────────────────────────────────
      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      # ── 3. Generate bilingual digest with Claude ─────────────────────────────
      - name: Generate bilingual digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-digest.js > /tmp/digest.txt

      - name: Preview digest (first 30 lines)
        run: head -30 /tmp/digest.txt

      # ── 4. Deliver ──────────────────────────────────────────────────────────
      - name: Deliver digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          DELIVERY_EMAIL:     ${{ secrets.DELIVERY_EMAIL }}
          DELIVERY_METHOD:    ${{ vars.DELIVERY_METHOD }}
        run: |
          mkdir -p ~/.follow-builders

          METHOD="${DELIVERY_METHOD:-email}"
          echo "=== Delivery method: '$METHOD' ==="
          echo "=== DELIVERY_EMAIL set: $([ -n "$DELIVERY_EMAIL" ] && echo YES || echo NO) ==="
          echo "=== RESEND_API_KEY set: $([ -n "$RESEND_API_KEY" ] && echo YES || echo NO) ==="

          printf '{"language":"bilingual","delivery":{"method":"%s","chatId":"%s","email":"%s"}}' \
            "$METHOD" "$TELEGRAM_CHAT_ID" "$DELIVERY_EMAIL" \
            > ~/.follow-builders/config.json

          echo "=== config.json ==="
          cat ~/.follow-builders/config.json

          printf 'TELEGRAM_BOT_TOKEN=%s\nRESEND_API_KEY=%s\n' \
            "$TELEGRAM_BOT_TOKEN" "$RESEND_API_KEY" \
            > ~/.follow-builders/.env

          echo "=== Running deliver.js ==="
          node scripts/deliver.js --file /tmp/digest.txt
          echo "=== deliver.js exit code: $? ==="
